services:
  runtime:
    build: .
    ports:
      - "3210:3210"
    environment:
      RENDO_RUNTIME_PORT: 3210
      RENDO_RUNTIME_MODE: ${RENDO_RUNTIME_MODE:-source}
      RENDO_PROVIDER_MODE: ${RENDO_PROVIDER_MODE:-local-mock}
      RENDO_API_KEY: ${RENDO_API_KEY:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3210/health"]
      interval: 10s
      timeout: 5s
      retries: 5
