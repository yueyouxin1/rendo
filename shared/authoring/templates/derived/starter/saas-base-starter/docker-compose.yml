services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: rendo
      POSTGRES_USER: rendo
      POSTGRES_PASSWORD: rendo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rendo -d rendo"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./cache/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://rendo:rendo@postgres:5432/rendo
      POSTGRES_URL: postgresql://rendo:rendo@postgres:5432/rendo
      REDIS_URL: redis://redis:6379
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-rendo-local-dev-secret-12345678901234567890}
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      AI_GATEWAY_API_KEY: ${AI_GATEWAY_API_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      TRIGGER_SECRET_KEY: ${TRIGGER_SECRET_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      HEALTHCHECK_URL: http://127.0.0.1:3000/api/health
    volumes:
      - .:/workspace
      - workspace_node_modules:/workspace/node_modules
      - web_node_modules:/workspace/apps/web/node_modules
      - db_node_modules:/workspace/db/node_modules
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "scripts/healthcheck.mjs"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
  redis_data:
  workspace_node_modules:
  web_node_modules:
  db_node_modules:
